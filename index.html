<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tilly FPV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0B0F17;
    --blue:#2D8CFF;
    --text:#ffffff;
    --text-secondary:#d8d8d8;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.hero{
    min-height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,.40),
        rgba(0,0,0,.40)
    ),
    url('hero.jpg');

    background-size:cover;
    background-position:50% 15%;
    display:flex;
    align-items:center;
}

.content{
    max-width:1200px;
    padding:60px;
}

.tag{
    color:var(--blue);
    letter-spacing:4px;
    font-size:.9rem;
    font-weight:600;
    margin-bottom:20px;
}

h1{
    font-size:clamp(4rem,8vw,7rem);
    line-height:0.95;
    margin-bottom:24px;
}

.subtitle{
    font-size:1.25rem;
    color:var(--text-secondary);
    line-height:1.8;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    color:white;
    background:var(--blue);
    padding:15px 30px;
    border-radius:10px;
    font-weight:700;
    transition:0.2s;
}

.btn:hover{
    transform:translateY(-2px);
}

.scroll{
    position:absolute;
    bottom:30px;
    left:60px;
    color:white;
    opacity:.6;
    font-size:.9rem;
}

@media(max-width:768px){

    .hero{
        align-items:flex-end;
        background-position:center top;
    }

    .content{
        padding:30px;
        padding-bottom:90px;
    }

    h1{
        font-size:3.5rem;
    }

    .subtitle{
        font-size:1rem;
    }

    .scroll{
        left:30px;
    }
}

</style>
</head>

<body>

<section class="hero">

    <div class="content">

        <div class="tag">
            FPV PILOT • CONTENT CREATOR
        </div>

        <h1>
            TILLY FPV
        </h1>

        <div class="subtitle">
            Freestyle FPV Pilot<br>
            Videographer<br>
            Content Creator
        </div>

        <div class="buttons">

            <a class="btn"
               href="https://youtube.com/@tilly_fpv"
               target="_blank">
               ▶ YouTube
            </a>

            <a class="btn"
               href="https://www.instagram.com/tilly_fpv"
               target="_blank">
               ◎ Instagram
            </a>

            <a class="btn"
               href="https://www.tiktok.com/@tilly79_mw"
               target="_blank">
               ♪ TikTok
            </a>

        </div>

    </div>

    <div class="scroll">
        ↓ Scroll for more
    </div>

</section>

</body>
</html>
