<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilly FPV</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#0B0F17;
            color:white;
        }

        .hero{
            min-height:100vh;
            background:
            linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
            url('hero.jpg');
            background-size:cover;
            background-position:center;
            display:flex;
            align-items:center;
        }

        .content{
            max-width:1200px;
            padding:40px;
        }

        .tag{
            color:#2D8CFF;
            letter-spacing:3px;
            font-size:.9rem;
            margin-bottom:20px;
        }

        h1{
            font-size:clamp(3rem,8vw,6rem);
            margin-bottom:20px;
        }

        .subtitle{
            font-size:1.2rem;
            color:#d0d0d0;
            max-width:600px;
            line-height:1.6;
            margin-bottom:30px;
        }

        .buttons{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
        }

        .btn{
            background:#2D8CFF;
            color:white;
            text-decoration:none;
            padding:14px 28px;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            opacity:.9;
        }

        @media(max-width:768px){

            .hero{
                align-items:flex-end;
            }

            .content{
                padding:30px;
                padding-bottom:80px;
            }

            h1{
                font-size:3rem;
            }
        }
    </style>
</head>

<body>

<section class="hero">

    <div class="content">

        <div class="tag">
            FPV PILOT • CONTENT CREATOR
        </div>

        <h1>TILLY FPV</h1>

        <div class="subtitle">
            Freestyle FPV pilot, videographer and content creator exploring unique places from a different perspective.
        </div>

        <div class="buttons">

            <a class="btn"
               href="https://youtube.com/@tilly_fpv"
               target="_blank">
               YouTube
            </a>

            <a class="btn"
               href="https://www.instagram.com/tilly_fpv"
               target="_blank">
               Instagram
            </a>

            <a class="btn"
               href="https://www.tiktok.com/@tilly79_mw"
               target="_blank">
               TikTok
            </a>

        </div>

    </div>

</section>

</body>
</html>
