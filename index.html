<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tilly FPV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0b0f17;
    --blue:#2d8cff;
    --text:#ffffff;
    --text-secondary:#d8d8d8;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.hero{
    min-height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,.30),
        rgba(0,0,0,.45)
    ),
    url("hero.jpg");

    background-size:cover;
    background-position:center top;

    display:flex;
    align-items:center;
}

.content{
    width:100%;
    max-width:700px;
    padding-left:80px;
}

.tag{
    color:var(--blue);
    font-size:.9rem;
    letter-spacing:4px;
    font-weight:700;
    margin-bottom:20px;
}

h1{
    font-size:clamp(5rem,9vw,8rem);
    line-height:.9;
    margin-bottom:30px;
}

.subtitle{
    font-size:1.35rem;
    line-height:1.9;
    color:var(--text-secondary);
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    color:white;
    background:var(--blue);
    padding:16px 30px;
    border-radius:12px;
    font-weight:700;
    transition:.2s;
}

.btn:hover{
    transform:translateY(-3px);
}

.scroll{
    position:absolute;
    bottom:30px;
    left:80px;
    opacity:.6;
}

@media(max-width:900px){

    .hero{
        align-items:flex-end;
    }

    .content{
        padding:30px;
        padding-bottom:90px;
    }

    h1{
        font-size:4rem;
    }

    .subtitle{
        font-size:1.1rem;
    }

    .scroll{
        left:30px;
    }
}

</style>
</head>

<body>

<section class="hero">

<div class="content">

<div class="tag">
FPV PILOT • CONTENT CREATOR
</div>

<h1>
TILLY FPV
</h1>

<div class="subtitle">
Freestyle FPV Pilot<br>
Videographer<br>
Content Creator
</div>

<div class="buttons">

<a class="btn"
href="https://www.youtube.com/@tilly_fpv"
target="_blank">
▶ YouTube
</a>

<a class="btn"
href="https://www.instagram.com/tilly_fpv/"
target="_blank">
◎ Instagram
</a>

<a class="btn"
href="https://www.tiktok.com/@tilly79_mw"
target="_blank">
♪ TikTok
</a>

</div>

</div>

<div class="scroll">
↓ Scroll for more
</div>

</section>

</body>
</html>
