<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tilly FPV</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#0b0f17;
    color:white;
}

/* HERO */

.hero{
    min-height:100vh;
    background:
        linear-gradient(
            rgba(0,0,0,.65),
            rgba(0,0,0,.75)
        ),
        url("asset/hero1.jpg");
    background-size:cover;
    background-position:center center;
    display:flex;
    align-items:center;
}

.content{
    max-width:700px;
    padding:80px;
}

.tag{
    color:#3d8dff;
    letter-spacing:8px;
    font-size:14px;
    font-weight:700;
    margin-bottom:25px;
    text-transform:uppercase;
    text-shadow:0 2px 14px rgba(0,0,0,.9);
}

h1{
    font-size:110px;
    font-weight:900;
    line-height:0.9;
    margin-bottom:40px;
    text-shadow:0 4px 25px rgba(0,0,0,.65);
}

.subtitle{
    font-size:24px;
    line-height:1.8;
    color:#f0f0f0;
    margin-bottom:70px;
    text-shadow:0 3px 15px rgba(0,0,0,.8);
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    display:inline-block;
    background:#3d8dff;
    color:white;
    text-decoration:none;
    padding:18px 28px;
    border-radius:14px;
    font-size:20px;
    font-weight:700;
    transition:.25s;
    box-shadow:0 10px 35px rgba(0,0,0,.35);
}

.btn:hover{
    transform:translateY(-3px);
    background:#5aa0ff;
}

/* VIDEO SECTION */

.video-section{
    padding:100px 30px;
    background:#071224;
}

.video-container{
    max-width:1000px;
    margin:auto;
}

.video-tag{
    color:#3d8dff;
    letter-spacing:8px;
    font-size:14px;
    font-weight:700;
    text-transform:uppercase;
    margin-bottom:20px;
}

.video-title{
    font-size:60px;
    font-weight:800;
    margin-bottom:40px;
}

.video-wrapper{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);
}

.video-wrapper iframe{
    position:absolute;
    width:100%;
    height:100%;
    left:0;
    top:0;
    border:none;
}

/* MOBILE */

@media(max-width:800px){

    .hero{
        min-height:78vh;
        background-position:center 20%;
        align-items:flex-start;
    }

    .content{
        padding:50px;
        margin-top:-260px;
    }

    .tag{
        font-size:12px;
        letter-spacing:5px;
        margin-bottom:18px;
    }

    h1{
        font-size:84px;
        margin-bottom:55px;
    }

    .subtitle{
        font-size:18px;
        line-height:1.7;
        margin-bottom:80px;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:10px;
    }

    .btn{
        text-align:center;
        font-size:16px;
        padding:18px 10px;
        border-radius:12px;
        white-space:nowrap;
    }

    .video-section{
        padding:55px 22px 80px;
    }

    .video-title{
        font-size:42px;
    }
}

@media(max-width:380px){

    .content{
        padding:42px;
        margin-top:-245px;
    }

    h1{
        font-size:74px;
    }

    .btn{
        font-size:14px;
        padding:15px 6px;
    }
}

</style>
</head>

<body>

<section class="hero">

    <div class="content">

        <div class="tag">
            FPV PILOT • CONTENT CREATOR
        </div>

        <h1>
            TILLY FPV
        </h1>

        <div class="subtitle">
            Freestyle FPV Pilot<br>
            FPV Filmmaker<br>
            Content Creator
        </div>

        <div class="buttons">

            <a class="btn"
               href="https://youtube.com/@tilly_fpv"
               target="_blank">
               ▶ YouTube
            </a>

            <a class="btn"
               href="https://www.instagram.com/tilly_fpv/"
               target="_blank">
               ◎ Instagram
            </a>

            <a class="btn"
               href="https://www.tiktok.com/@tilly79_mw"
               target="_blank">
               ♪ TikTok
            </a>

        </div>

    </div>

</section>

<section class="video-section">

    <div class="video-container">

        <div class="video-tag">
            Latest Video
        </div>

        <div class="video-title">
            Pure Emotion
        </div>

        <div class="video-wrapper">
            <iframe
                src="https://www.youtube.com/embed/myYRoYWM76E"
                title="Tilly FPV - Pure Emotion"
                allowfullscreen>
            </iframe>
        </div>

    </div>

</section>

</body>
</html>
