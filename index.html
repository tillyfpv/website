<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tilly FPV | FPV Pilot & Content Creator</title>

<meta name="description" content="Tilly FPV – Freestyle FPV Pilot, FPV Filmmaker and Content Creator. Lost places, freestyle lines, events and unique perspectives.">

<meta property="og:title" content="Tilly FPV | FPV Pilot & Content Creator">
<meta property="og:description" content="Freestyle FPV Pilot • FPV Filmmaker • Content Creator">
<meta property="og:image" content="https://tillyfpv.de/asset/og-image.jpg">
<meta property="og:url" content="https://tillyfpv.de">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tilly FPV">
<meta name="twitter:description" content="Freestyle FPV Pilot • FPV Filmmaker • Content Creator">
<meta name="twitter:image" content="https://tillyfpv.de/asset/og-image.jpg">

<link rel="icon" type="image/png" href="asset/favicon.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#05080d;
    color:white;
}

.nav{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:100;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 34px;
    background:linear-gradient(rgba(5,8,13,.92), rgba(5,8,13,.35), transparent);
}

.logo{
    font-weight:900;
    letter-spacing:2px;
    text-decoration:none;
    color:white;
}

.nav-links{
    display:flex;
    gap:24px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:800;
    opacity:.82;
}

.nav-links a:hover{
    opacity:1;
    color:#66aaff;
}

.menu-btn{
    display:none;
    background:none;
    border:none;
    color:white;
    font-size:32px;
    cursor:pointer;
}

.mobile-menu{
    display:none;
    position:fixed;
    top:72px;
    left:18px;
    right:18px;
    z-index:99;
    background:rgba(7,18,36,.96);
    border:1px solid rgba(255,255,255,.12);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 25px 80px rgba(0,0,0,.5);
}

.mobile-menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:18px 22px;
    font-weight:800;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.mobile-menu a:last-child{
    border-bottom:none;
}

.mobile-menu.open{
    display:block;
}

.hero{
    min-height:100vh;
    position:relative;
    background:
        linear-gradient(
            rgba(0,0,0,.55),
            rgba(0,0,0,.78)
        ),
        url("asset/hero1.jpg");
    background-size:cover;
    background-position:center center;
    display:flex;
    align-items:center;
}

.content{
    max-width:720px;
    padding:80px;
}

.tag,
.section-tag{
    color:#66aaff;
    letter-spacing:6px;
    font-size:13px;
    font-weight:800;
    text-transform:uppercase;
    margin-bottom:20px;
    text-shadow:0 2px 14px rgba(0,0,0,.9);
}

h1{
    font-size:110px;
    font-weight:900;
    line-height:.9;
    margin-bottom:42px;
    text-shadow:0 4px 25px rgba(0,0,0,.7);
}

.subtitle{
    font-size:24px;
    line-height:1.8;
    color:#f0f0f0;
    margin-bottom:70px;
    text-shadow:0 3px 15px rgba(0,0,0,.9);
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    display:inline-block;
    background:#3d8dff;
    color:white;
    text-decoration:none;
    padding:18px 28px;
    border-radius:14px;
    font-size:18px;
    font-weight:800;
    box-shadow:0 10px 35px rgba(0,0,0,.45);
    transition:.25s;
    border:none;
    cursor:pointer;
}

.btn:hover{
    transform:translateY(-3px);
    background:#5aa0ff;
}

section{
    padding:95px 30px;
    scroll-margin-top:90px;
}

.dark{
    background:#071224;
}

.container{
    max-width:1150px;
    margin:auto;
}

h2{
    font-size:52px;
    margin-bottom:45px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
}

.card{
    background:linear-gradient(180deg,#101827,#080c13);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.35);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

.card-content{
    padding:24px;
}

.card small{
    color:#66aaff;
    letter-spacing:3px;
    text-transform:uppercase;
    font-weight:800;
}

.card h3{
    font-size:26px;
    margin:12px 0 20px;
}

.card p{
    color:#cfd6e3;
    line-height:1.6;
}

.card a{
    color:white;
    text-decoration:none;
    font-weight:800;
}

.event-card{
    padding:28px;
}

.event-date{
    font-size:34px;
    font-weight:900;
    color:white;
    margin-bottom:18px;
}

.status{
    display:inline-block;
    margin-top:18px;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(102,170,255,.15);
    color:#66aaff;
    font-size:12px;
    font-weight:900;
    letter-spacing:2px;
    text-transform:uppercase;
}

.booking-box{
    background:
        linear-gradient(135deg,rgba(61,141,255,.18),rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.12);
    border-radius:28px;
    padding:40px;
    box-shadow:0 30px 90px rgba(0,0,0,.35);
}

.booking-box p,
.about p{
    max-width:850px;
    color:#d8d8d8;
    line-height:1.8;
    font-size:18px;
    margin-bottom:30px;
}

.booking-form{
    margin-top:35px;
    display:grid;
    gap:18px;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

input,
textarea,
select{
    width:100%;
    background:#080c13;
    color:white;
    border:1px solid rgba(255,255,255,.16);
    border-radius:14px;
    padding:16px;
    font-size:16px;
    font-family:Arial, Helvetica, sans-serif;
}

textarea{
    min-height:140px;
    resize:vertical;
}

.legal-note{
    color:#9da8b8;
    font-size:14px;
    line-height:1.6;
}

.footer{
    padding:45px 25px;
    background:#05080d;
    text-align:center;
    color:#8f98a8;
    font-size:14px;
}

.footer-links{
    margin-top:18px;
}

.footer a{
    color:#8f98a8;
    text-decoration:none;
    margin:0 10px;
}

.footer a:hover{
    color:white;
}

@media(max-width:850px){

    .nav{
        padding:18px 22px;
        background:rgba(5,8,13,.82);
        backdrop-filter:blur(10px);
    }

    .nav-links{
        display:none;
    }

    .menu-btn{
        display:block;
    }

    .hero{
        min-height:82vh;
        display:block;
        background-position:center center;
    }

    .content{
        position:absolute;
        top:75px;
        left:0;
        right:0;
        padding:0 28px;
        max-width:none;
    }

    .tag{
        font-size:12px;
        letter-spacing:4px;
        margin-bottom:18px;
    }

    h1{
        font-size:64px;
        margin-bottom:42px;
    }

    .subtitle{
        font-size:18px;
        line-height:1.7;
        margin-bottom:115px;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:10px;
    }

    .btn{
        text-align:center;
        font-size:14px;
        padding:15px 5px;
        border-radius:12px;
        white-space:nowrap;
    }

    section{
        padding:60px 22px;
        scroll-margin-top:80px;
    }

    h2{
        font-size:36px;
        margin-bottom:30px;
    }

    .grid{
        grid-template-columns:1fr;
        gap:20px;
    }

    .card img{
        height:210px;
    }

    .form-row{
        grid-template-columns:1fr;
    }

    .booking-box{
        padding:28px;
    }
}

@media(max-width:380px){

    .content{
        top:68px;
        padding:0 24px;
    }

    h1{
        font-size:56px;
    }

    .subtitle{
        font-size:17px;
        margin-bottom:95px;
    }

    .btn{
        font-size:13px;
        padding:14px 4px;
    }
}
</style>
</head>

<body>

<nav class="nav">
    <a class="logo" href="#top">TILLY FPV</a>

    <div class="nav-links">
        <a href="#events" data-i18n="nav.events">Events</a>
        <a href="#videos" data-i18n="nav.videos">Videos</a>
        <a href="#gallery" data-i18n="nav.gallery">Gallery</a>
        <a href="#booking" data-i18n="nav.booking">Booking</a>
        <a href="#about" data-i18n="nav.about">About</a>
    </div>

    <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        ☰
    </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="#events" data-i18n="nav.events">Events</a>
    <a href="#videos" data-i18n="nav.videos">Videos</a>
    <a href="#gallery" data-i18n="nav.gallery">Gallery</a>
    <a href="#booking" data-i18n="nav.booking">Booking</a>
    <a href="#about" data-i18n="nav.about">About</a>
    <a href="impressum.html" data-i18n="footerImprint">Impressum</a>
    <a href="datenschutz.html" data-i18n="footerPrivacy">Datenschutz</a>
</div>

<section class="hero" id="top">
    <div class="content">
        <div class="tag" id="heroTag"></div>

        <h1 id="heroTitle"></h1>

        <div class="subtitle" id="heroSubtitle"></div>

        <div class="buttons">
            <a class="btn" id="youtubeLink" href="#" target="_blank">▶ YouTube</a>
            <a class="btn" id="instagramLink" href="#" target="_blank">◎ Instagram</a>
            <a class="btn" id="tiktokLink" href="#" target="_blank">♪ TikTok</a>
        </div>
    </div>
</section>

<section class="dark" id="events">
    <div class="container">
        <div class="section-tag" id="eventsTag"></div>
        <h2 id="eventsTitle"></h2>
        <div class="grid" id="eventsGrid"></div>
    </div>
</section>

<section id="videos">
    <div class="container">
        <div class="section-tag" id="videosTag"></div>
        <h2 id="videosTitle"></h2>
        <div class="grid" id="videosGrid"></div>
    </div>
</section>

<section class="dark" id="gallery">
    <div class="container">
        <div class="section-tag" id="galleryTag"></div>
        <h2 id="galleryTitle"></h2>
        <div class="grid" id="galleryGrid"></div>
    </div>
</section>

<section class="booking" id="booking">
    <div class="container">
        <div class="section-tag" id="bookingTag"></div>
        <h2 id="bookingHeadline"></h2>

        <div class="booking-box">
            <p id="bookingText"></p>

            <a class="btn" id="bookingButton" href="#" target="_blank"></a>

            <form class="booking-form" id="bookingForm" style="display:none;">
                <div class="form-row">
                    <input type="text" name="name" placeholder="Name" required>
                    <input type="email" name="email" placeholder="E-Mail" required>
                </div>

                <div class="form-row">
                    <input type="text" name="event" placeholder="Event / Project">
                    <input type="text" name="date" placeholder="Date / Timeframe">
                </div>

                <select name="type">
                    <option value="">Type of request</option>
                    <option value="event">Event Coverage</option>
                    <option value="fpv-shoot">FPV Shoot</option>
                    <option value="collab">Collaboration</option>
                    <option value="other">Other</option>
                </select>

                <textarea name="message" placeholder="Tell me about your project"></textarea>

                <p class="legal-note">
                    By sending this request, you agree that your information will be used to process your booking request.
                </p>

                <button class="btn" type="submit">
                    Send Request
                </button>
            </form>
        </div>
    </div>
</section>

<section class="about dark" id="about">
    <div class="container">
        <div class="section-tag" id="aboutTag"></div>
        <h2 id="aboutTitle"></h2>
        <p id="aboutText"></p>
    </div>
</section>

<footer class="footer">
    © Tilly FPV

    <div class="footer-links">
        <a href="impressum.html" id="footerImprint"></a>
        <a href="datenschutz.html" id="footerPrivacy"></a>
        <a id="footerInstagram" href="#" target="_blank">Instagram</a>
        <a id="footerYoutube" href="#" target="_blank">YouTube</a>
    </div>
</footer>

<script src="content.js"></script>

<script>
function getLanguage(){
    const browserLanguage = navigator.language || navigator.userLanguage || "en";
    const dachLanguages = ["de-DE", "de-AT", "de-CH", "de-LI", "de"];
    return dachLanguages.some(lang => browserLanguage.toLowerCase().startsWith(lang.toLowerCase())) ? "de" : "en";
}

const currentLanguage = getLanguage();
const content = siteContent[currentLanguage];

document.documentElement.lang = currentLanguage;

const menuBtn = document.getElementById("menuBtn");
const mobileMenu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("open");
});

mobileMenu.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", () => {
        mobileMenu.classList.remove("open");
    });
});

document.getElementById("youtubeLink").href = siteContent.social.youtube;
document.getElementById("instagramLink").href = siteContent.social.instagram;
document.getElementById("tiktokLink").href = siteContent.social.tiktok;
document.getElementById("footerInstagram").href = siteContent.social.instagram;
document.getElementById("footerYoutube").href = siteContent.social.youtube;

function translateNavigation(){
    document.querySelectorAll("[data-i18n]").forEach(element => {
        const path = element.getAttribute("data-i18n").split(".");
        let value = content;

        path.forEach(key => {
            value = value[key];
        });

        element.textContent = value;
    });
}

function renderHero(){
    document.getElementById("heroTag").textContent = content.heroTag;
    document.getElementById("heroTitle").textContent = content.heroTitle;
    document.getElementById("heroSubtitle").innerHTML = content.heroSubtitle.join("<br>");
}

function renderEvents(){
    const container = document.getElementById("eventsGrid");
    container.innerHTML = "";

    content.events.forEach(event => {
        container.innerHTML += `
            <div class="card event-card">
                <div class="event-date">${event.date}</div>
                <h3>${event.title}</h3>
                <p>${event.location}</p>
                <span class="status">${event.status}</span>
            </div>
        `;
    });
}

function renderVideos(){
    const container = document.getElementById("videosGrid");
    container.innerHTML = "";

    content.videos.forEach(video => {
        container.innerHTML += `
            <div class="card">
                <img src="${video.thumbnail}" alt="${video.title}">
                <div class="card-content">
                    <small>${video.category}</small>
                    <h3>${video.title}</h3>
                    <a href="${video.link}" target="_blank">Watch →</a>
                </div>
            </div>
        `;
    });
}

function renderGallery(){
    const container = document.getElementById("galleryGrid");
    container.innerHTML = "";

    content.gallery.forEach(item => {
        container.innerHTML += `
            <div class="card">
                <img src="${item.image}" alt="${item.title}">
                <div class="card-content">
                    <h3>${item.title}</h3>
                </div>
            </div>
        `;
    });
}

function renderBooking(){
    document.getElementById("bookingTag").textContent = content.bookingTag;
    document.getElementById("bookingHeadline").textContent = content.bookingHeadline;
    document.getElementById("bookingText").textContent = content.bookingText;
    document.getElementById("bookingButton").textContent = content.bookingButton;
    document.getElementById("bookingButton").href = siteContent.booking.buttonLink;

    if(siteContent.booking.enabled === true){
        document.getElementById("bookingButton").style.display = "none";
        document.getElementById("bookingForm").style.display = "grid";
    }
}

function renderStaticSections(){
    document.getElementById("eventsTag").textContent = content.eventsTag;
    document.getElementById("eventsTitle").textContent = content.eventsTitle;
    document.getElementById("videosTag").textContent = content.videosTag;
    document.getElementById("videosTitle").textContent = content.videosTitle;
    document.getElementById("galleryTag").textContent = content.galleryTag;
    document.getElementById("galleryTitle").textContent = content.galleryTitle;
    document.getElementById("aboutTag").textContent = content.aboutTag;
    document.getElementById("aboutTitle").textContent = content.aboutTitle;
    document.getElementById("aboutText").textContent = content.aboutText;
    document.getElementById("footerImprint").textContent = content.footerImprint;
    document.getElementById("footerPrivacy").textContent = content.footerPrivacy;
}

translateNavigation();
renderHero();
renderStaticSections();
renderEvents();
renderVideos();
renderGallery();
renderBooking();
</script>

</body>
</html>
